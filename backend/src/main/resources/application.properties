spring.application.name=LuminaHire
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:luminahire
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# GEMINI API KEY - Replace with your real key from
# https://aistudio.google.com/app/apikey
# ============================================================
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.model.name=gemini-2.0-flash

# File upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# OAUTH 2.0 CONFIGURATION
# Replace with your real Client ID and Secret from
# Google Cloud Console and LinkedIn Developer Portal
# ============================================================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.linkedin.client-id=YOUR_LINKEDIN_CLIENT_ID
spring.security.oauth2.client.registration.linkedin.client-secret=YOUR_LINKEDIN_CLIENT_SECRET
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.linkedin.client-name=LinkedIn
spring.security.oauth2.client.provider.linkedin.issuer-uri=https://www.linkedin.com/oauth
